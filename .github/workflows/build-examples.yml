name: 🏗️ Build Example Apps

on:
  push:
    branches:
      - main
    paths:
      - 'example/**'
      - 'packages/react-native-sortables/**'
      - '.github/workflows/build-examples.yml'
  workflow_dispatch: # Allow manual triggering

env:
  NODE_VERSION: '20'

jobs:
  # Build Expo app locally (no EAS required)
  build-expo:
    name: 📱 Build Expo App
    runs-on: ubuntu-latest
    concurrency:
      group: build-expo-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 📱 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 🔍 Validate Expo configuration
        working-directory: example/expo
        env:
          EXPO_DOCTOR_SKIP_DEPENDENCY_VERSION_CHECK: true
        run: npx expo-doctor

      - name: 🏗️ Build Expo bundle
        working-directory: example/expo
        run: npx expo export --platform all

      - name: 📦 Upload Expo build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-build
          path: example/expo/dist/
          retention-days: 7

  # Build React Native apps (Fabric and Paper)
  build-react-native:
    name: 📱 Build ${{ matrix.app }} (${{ matrix.platform }})
    runs-on: macos-15
    concurrency:
      group: build-react-native-${{ matrix.app }}-${{ matrix.platform }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        app: [fabric, paper]
        platform: [ios, android]
      fail-fast: false

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 🍎 Setup Ruby (iOS only)
        if: matrix.platform == 'ios'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: 🍎 Select Xcode (iOS only)
        if: matrix.platform == 'ios'
        # Paper uses old-architecture Reanimated 3.19.x, which imports <stdatomic.h>
        # and fails to compile against iOS SDKs that guard <atomic> vs <stdatomic.h>
        # before C++23 (iOS 18.4 in Xcode 16.3 and 18.5 in 16.4 both hit it). Pin
        # only paper to Xcode 16.2 (iOS 18.2 SDK). fabric stays on 16.4.
        run: sudo xcode-select --switch /Applications/Xcode_${{ matrix.app == 'paper' && '16.2' || '16.4' }}.app

      - name: ☕ Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK (Android only)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: 🍎 Install pods (iOS only)
        if: matrix.platform == 'ios'
        working-directory: example/${{ matrix.app }}/ios
        run: |
          bundle install
          bundle exec pod install

      - name: 🍎 Build iOS
        if: matrix.platform == 'ios'
        working-directory: example/${{ matrix.app }}
        run: |
          if [ "${{ matrix.app }}" = "paper" ]; then
            # Paper runs on Xcode 16.2 (iOS 18.2 SDK). run-ios needs a concrete
            # simulator device and would auto-pick a newer runtime (shared across
            # the runner's Xcodes) that 16.2 can't target. Compile against the
            # simulator SDK directly with a generic destination — no device,
            # no launch — which is all CI needs to verify the native build.
            xcodebuild -workspace ios/reactNativeSortablePaper.xcworkspace \
              -scheme reactNativeSortablePaper -configuration Debug \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO build
          else
            yarn react-native run-ios --no-packager --scheme "reactNativeSortableFabric"
          fi

      - name: 🤖 Build Android
        if: matrix.platform == 'android'
        working-directory: example/${{ matrix.app }}
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.platform }}-build
          path: |
            example/${{ matrix.app }}/ios/build/
            example/${{ matrix.app }}/android/app/build/
          retention-days: 7

  # Build Web app
  build-web:
    name: 🌐 Build Web App
    runs-on: ubuntu-latest
    concurrency:
      group: build-web-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 🌐 Build web app
        working-directory: example/web
        run: yarn expo export -p web

      - name: 📦 Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: example/web/dist/
          retention-days: 7
